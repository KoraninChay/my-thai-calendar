<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าลิ้งค์มาทำไม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@700;900&display=swap');
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        .text-huge {
            font-size: clamp(3rem, 15vw, 8rem);
            line-height: 1.1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white text-center">

    <div class="max-w-5xl animate-in fade-in zoom-in duration-700">
        <!-- ข้อความหลักตัวใหญ่มาก -->
        <h1 class="text-huge font-black mb-8 drop-shadow-2xl">
            เข้าลิ้งค์มาทำไม?
        </h1>
        
        <!-- คำอธิบายเพิ่มเติมตัวใหญ่ -->
        <div class="space-y-6">
            <p class="text-2xl md:text-4xl font-medium opacity-90">
                ยินดีต้อนรับเข้าสู่ระบบจัดการข้อมูลกลุ่ม
            </p>
            
            <div class="inline-block bg-white/20 backdrop-blur-md rounded-3xl p-8 mt-10 border border-white/30 shadow-2xl">
                <p class="text-xl md:text-2xl leading-relaxed">
                    คุณเข้าลิ้งค์นี้มาเพื่อ <span class="text-yellow-300 font-bold underline">บันทึกและซิงค์ข้อมูล</span> <br class="hidden md:block"> 
                    ร่วมกับคนในทีมแบบ Real-time ครับ
                </p>
            </div>
        </div>

        <!-- ปุ่มกดกลับ (ถ้าต้องการ) -->
        <div class="mt-16">
            <p class="text-lg opacity-60 animate-bounce">
                กรุณารอสักครู่ ระบบกำลังนำคุณไป...
            </p>
        </div>
    </div>

</body>
</html>
