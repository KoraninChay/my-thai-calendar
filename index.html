<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินซิงค์ข้อมูลกลุ่ม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 1. Initial Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // ใช้ appId ที่แน่นอนเพื่อให้ข้อมูลไม่กระจัดกระจาย
        const appId = typeof __app_id !== 'undefined' ? __app_id : "calendar-permanent-v1";

        window.appointments = [];
        window.isReady = false;

        // 2. Auth Sequence - สำคัญมาก ต้อง Auth ก่อนเรียกข้อมูล
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error:", e);
                updateStatus(false, "ไม่สามารถระบุตัวตนได้");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.isReady = true;
                startCloudSync();
            }
        });

        // 3. Data Sync - ใช้ Path ที่ระบบอนุญาตให้อ่าน/เขียนได้จริง
        function startCloudSync() {
            // โครงสร้าง Path: /artifacts/{appId}/public/data/{collectionName}
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
            
            // ใช้ Simple Query เพื่อหลีกเลี่ยงการสร้าง Index
            onSnapshot(colRef, (snapshot) => {
                const list = [];
                snapshot.forEach((doc) => {
                    list.push({ id: doc.id, ...doc.data() });
                });
                window.appointments = list;
                updateStatus(true);
                window.renderCalendar();
            }, (err) => {
                console.error("Firestore Sync Error:", err);
                updateStatus(false, "ซิงค์ล้มเหลว: " + err.code);
            });
        }

        function updateStatus(online, msg = "") {
            const el = document.getElementById('syncStatus');
            if (el) {
                el.innerHTML = online 
                    ? '<span class="text-emerald-400 font-medium text-xs"><i class="fas fa-check-circle mr-1"></i> เชื่อมต่อ Cloud สำเร็จ (ข้อมูลปลอดภัย)</span>' 
                    : `<span class="text-rose-400 font-medium text-xs"><i class="fas fa-times-circle mr-1"></i> ${msg || 'กำลังเชื่อมต่อ...'}</span>`;
            }
        }

        // 4. บันทึกข้อมูล
        window.saveToCloud = async (appt) => {
            if (!window.isReady || !auth.currentUser) return;
            
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
                // เพิ่มข้อมูลพร้อม timestamp เพื่อการจัดเรียงในอนาคต
                await addDoc(colRef, {
                    ...appt,
                    createdBy: auth.currentUser.uid,
                    createdAt: Date.now()
                });
                return true;
            } catch (e) {
                console.error("Save Error:", e);
                throw e;
            }
        };

        // 5. ลบข้อมูล
        window.deleteFromCloud = async (id) => {
            if (!window.isReady) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id);
                await deleteDoc(docRef);
            } catch (e) {
                console.error("Delete Error:", e);
            }
        };

        initAuth();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; color: #1e293b; }
        .calendar-container { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .day-cell { min-height: 120px; border: 0.5px solid #f1f5f9; padding: 0.6rem; transition: 0.2s; position: relative; }
        .day-cell:hover { background: #f8fafc; cursor: pointer; }
        .today-cell { background: #eff6ff !important; border: 2px solid #3b82f6 !important; border-radius: 12px; z-index: 10; }
        .appt-chip { background: #f0fdf4; color: #166534; font-size: 0.75rem; padding: 4px 8px; border-radius: 8px; margin-top: 4px; border-left: 4px solid #22c55e; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .holiday-text { color: #ef4444; font-size: 0.65rem; font-weight: 600; margin-bottom: 2px; }
        .scroll-list { max-height: 80px; overflow-y: auto; scrollbar-width: none; }
        .scroll-list::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="calendar-container overflow-hidden">
            <!-- Header -->
            <div class="bg-indigo-600 p-6 md:p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 id="monthYearDisplay" class="text-3xl font-bold tracking-tight mb-2 uppercase">ปฏิทินงานกลุ่ม</h1>
                    <div id="syncStatus">กำลังเริ่มต้นระบบ...</div>
                </div>
                <div class="flex items-center gap-2 bg-black/10 p-2 rounded-2xl">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-white/20 rounded-xl transition"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="resetToday()" class="px-6 py-2 bg-white text-indigo-700 rounded-xl font-bold text-sm shadow-md">วันนี้</button>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-white/20 rounded-xl transition"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Sidebar Form -->
                <div class="lg:col-span-3">
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200 sticky top-6">
                        <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest flex items-center">
                            <i class="fas fa-plus-circle mr-2 text-indigo-500 text-base"></i>เพิ่มรายการใหม่
                        </h2>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">วันที่นัดหมาย</label>
                                <input type="date" id="inputDate" class="w-full mt-1 p-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 uppercase">สิ่งที่ต้องทำ</label>
                                <textarea id="inputTitle" rows="3" placeholder="ระบุรายละเอียด..." class="w-full mt-1 p-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                            </div>
                            <button id="addBtn" onclick="handleAdd()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                                <i class="fas fa-cloud-upload-alt"></i> บันทึกข้อมูล
                            </button>
                        </div>
                        <div class="mt-6 p-4 bg-amber-50 border border-amber-100 rounded-xl">
                            <p class="text-[10px] text-amber-700 leading-relaxed font-medium">
                                <i class="fas fa-lightbulb mr-1"></i> ข้อมูลจะถูกเก็บไว้บนระบบ Cloud ทุกคนในกลุ่มจะเห็นข้อมูลชุดเดียวกันทันที
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Calendar Content -->
                <div class="lg:col-span-9">
                    <div class="grid grid-cols-7 mb-3">
                        <div class="text-center py-2 text-[10px] font-black text-rose-500 uppercase tracking-widest">อาทิตย์</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">จันทร์</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">อังคาร</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">พุธ</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">พฤหัสบดี</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">ศุกร์</div>
                        <div class="text-center py-2 text-[10px] font-black text-indigo-500 uppercase tracking-widest">เสาร์</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 border-t border-l border-slate-100 rounded-2xl overflow-hidden shadow-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let viewDate = new Date();
        const thMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const holidays = { "01-01": "ปีใหม่", "04-13": "สงกรานต์", "04-14": "สงกรานต์", "04-15": "สงกรานต์", "05-01": "แรงงาน", "05-04": "ฉัตรมงคล", "07-28": "วัน ร.10", "08-12": "วันแม่", "10-13": "วัน ร.9", "10-23": "ปิยมหาราช", "12-05": "วันพ่อ", "12-10": "รัฐธรรมนูญ", "12-31": "สิ้นปี" };

        window.renderCalendar = () => {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toLocaleDateString('en-CA');
            
            document.getElementById('monthYearDisplay').innerText = `${thMonths[month]} ${year + 543}`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // วันที่ว่างของเดือนก่อนหน้า
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell bg-slate-50/40';
                grid.appendChild(empty);
            }

            // สร้างช่องวันในเดือน
            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                
                const cell = document.createElement('div');
                cell.className = `day-cell ${isToday ? 'today-cell' : ''}`;
                cell.onclick = () => {
                    document.getElementById('inputDate').value = dateStr;
                    document.getElementById('inputTitle').focus();
                };

                let html = `<div class="flex justify-between items-start mb-2">
                                <span class="text-sm font-bold ${isToday ? 'text-indigo-600' : 'text-slate-500'}">${day}</span>`;
                
                const hName = holidays[dateStr.substring(5)];
                if (hName) html += `<span class="holiday-text">${hName}</span>`;
                html += `</div>`;

                html += `<div class="scroll-list space-y-1.5">`;
                const evts = (window.appointments || []).filter(a => a.date === dateStr);
                evts.forEach(ev => {
                    html += `
                        <div class="appt-chip group animate-in fade-in duration-300">
                            <span class="truncate font-medium">${ev.title}</span>
                            <button onclick="event.stopPropagation(); window.deleteFromCloud('${ev.id}')" class="opacity-0 group-hover:opacity-100 transition-opacity ml-1 text-rose-500 hover:scale-110">
                                <i class="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>`;
                });
                html += `</div>`;

                cell.innerHTML = html;
                grid.appendChild(cell);
            }

            // วันที่ว่างของเดือนถัดไป
            const totalCells = firstDay + lastDay;
            const extraCells = (7 - (totalCells % 7)) % 7;
            for (let i = 0; i < extraCells; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell bg-slate-50/40';
                grid.appendChild(empty);
            }
        };

        window.handleAdd = async () => {
            const date = document.getElementById('inputDate').value;
            const title = document.getElementById('inputTitle').value.trim();
            if (!date || !title) return;
            
            const btn = document.getElementById('addBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> กำลังซิงค์ข้อมูล...';

            try {
                await window.saveToCloud({ date, title });
                document.getElementById('inputTitle').value = '';
            } catch (e) {
                console.error("Save error:", e);
                const status = document.getElementById('syncStatus');
                status.innerHTML = `<span class="text-rose-500 font-bold text-xs"><i class="fas fa-exclamation-circle"></i> บันทึกไม่สำเร็จ กรุณาลองใหม่</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        };

        window.changeMonth = (dir) => { viewDate.setMonth(viewDate.getMonth() + dir); window.renderCalendar(); };
        window.resetToday = () => { viewDate = new Date(); window.renderCalendar(); };
        
        window.onload = () => {
            document.getElementById('inputDate').value = new Date().toLocaleDateString('en-CA');
            window.renderCalendar();
        };
    </script>
</body>
</html>
