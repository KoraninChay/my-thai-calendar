!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินซิงค์ข้อมูลกลุ่ม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 1. Initial Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "calendar-group-v5";

        window.appointments = [];
        window.isReady = false;

        // 2. Auth Sequence (Rule 3: Auth Before Queries)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth error:", e);
                updateStatus(false, "การยืนยันตัวตนล้มเหลว");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.isReady = true;
                startCloudSync(user.uid);
            }
        });

        // 3. Data Sync (Rule 1: Strict Paths)
        function startCloudSync(uid) {
            // ใช้ Path ที่ได้รับอนุญาตสูงสุดสำหรับการแชร์ข้อมูล
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'calendar_events');
            
            // ใช้ Simple Query (Rule 2: No Complex Queries)
            onSnapshot(colRef, (snapshot) => {
                const list = [];
                snapshot.forEach((doc) => {
                    list.push({ id: doc.id, ...doc.data() });
                });
                window.appointments = list;
                updateStatus(true);
                window.renderCalendar();
            }, (err) => {
                console.error("Firestore error:", err);
                if (err.code === 'permission-denied') {
                    updateStatus(false, "สิทธิ์การเข้าถึงถูกปฏิเสธ (Permission Denied)");
                } else {
                    updateStatus(false, "การเชื่อมต่อขัดข้อง");
                }
            });
        }

        function updateStatus(online, msg = "") {
            const el = document.getElementById('syncStatus');
            if (el) {
                el.innerHTML = online 
                    ? '<span class="text-emerald-400 font-medium text-xs"><i class="fas fa-check-circle mr-1"></i> เชื่อมต่อฐานข้อมูลแล้ว (พร้อมบันทึก)</span>' 
                    : `<span class="text-rose-400 font-medium text-xs"><i class="fas fa-times-circle mr-1"></i> ${msg || 'กำลังพยายามเชื่อมต่อ...'}</span>`;
            }
        }

        // 4. Save Logic
        window.saveToCloud = async (appt) => {
            if (!window.isReady || !auth.currentUser) return;
            
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'calendar_events');
                await addDoc(colRef, {
                    ...appt,
                    author: auth.currentUser.uid,
                    timestamp: Date.now()
                });
                return true;
            } catch (e) {
                console.error("Save Error:", e);
                throw e;
            }
        };

        window.deleteFromCloud = async (id) => {
            if (!window.isReady) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'calendar_events', id);
                await deleteDoc(docRef);
            } catch (e) {
                console.error("Delete Error:", e);
            }
        };

        // Start
        initAuth();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
        .calendar-container { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .day-cell { min-height: 110px; border: 0.5px solid #f1f5f9; padding: 0.5rem; transition: 0.2s; position: relative; }
        .day-cell:hover { background: #f1f5f9; cursor: pointer; }
        .today-cell { background: #f0f7ff !important; border: 2px solid #3b82f6 !important; border-radius: 8px; z-index: 10; }
        .appt-chip { background: #dcfce7; color: #166534; font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; margin-top: 3px; border-left: 3px solid #22c55e; display: flex; justify-content: space-between; align-items: center; }
        .holiday-text { color: #ef4444; font-size: 0.65rem; font-weight: 600; }
        .scroll-list { max-height: 70px; overflow-y: auto; scrollbar-width: none; }
    </style>
</head>
<body class="p-2 md:p-6 lg:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="calendar-container overflow-hidden">
            <!-- Header -->
            <div class="bg-indigo-600 p-6 md:p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 id="monthYearDisplay" class="text-3xl font-bold tracking-tight mb-1">ปฏิทินกลุ่ม</h1>
                    <div id="syncStatus">กำลังตรวจสอบสิทธิ์...</div>
                </div>
                <div class="flex items-center gap-3 bg-white/10 p-2 rounded-2xl">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-white/20 rounded-xl transition"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="resetToday()" class="px-6 py-2 bg-white text-indigo-700 rounded-xl font-bold text-sm shadow-sm">วันนี้</button>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-white/20 rounded-xl transition"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Sidebar -->
                <div class="lg:col-span-3 space-y-4">
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-200">
                        <h2 class="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">ลงนัดหมายใหม่</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500">วันที่เลือก</label>
                                <input type="date" id="inputDate" class="w-full mt-1 p-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500">หัวข้อ/รายละเอียด</label>
                                <textarea id="inputTitle" rows="3" placeholder="เช่น นัดประชุมกลุ่ม..." class="w-full mt-1 p-3 rounded-xl border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                            </div>
                            <button id="addBtn" onclick="handleAdd()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition">
                                <i class="fas fa-save mr-2"></i> บันทึกข้อมูล
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Calendar Content -->
                <div class="lg:col-span-9">
                    <div class="grid grid-cols-7 mb-2">
                        <div class="text-center py-2 text-[10px] font-black text-rose-500 uppercase">อาทิตย์</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase">จันทร์</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase">อังคาร</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase">พุธ</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase">พฤหัสบดี</div>
                        <div class="text-center py-2 text-[10px] font-black text-slate-400 uppercase">ศุกร์</div>
                        <div class="text-center py-2 text-[10px] font-black text-indigo-500 uppercase">เสาร์</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 border-t border-l border-slate-100 rounded-xl overflow-hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let viewDate = new Date();
        const thMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const holidays = { "01-01": "ปีใหม่", "04-13": "สงกรานต์", "04-14": "สงกรานต์", "04-15": "สงกรานต์", "05-01": "แรงงาน", "05-04": "ฉัตรมงคล", "07-28": "วัน ร.10", "08-12": "วันแม่", "10-13": "วัน ร.9", "10-23": "ปิยมหาราช", "12-05": "วันพ่อ", "12-10": "รัฐธรรมนูญ", "12-31": "สิ้นปี" };

        window.renderCalendar = () => {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toLocaleDateString('en-CA');
            
            document.getElementById('monthYearDisplay').innerText = `${thMonths[month]} ${year + 543}`;
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // วันที่เดือนก่อนหน้า
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell bg-slate-50/50';
                grid.appendChild(empty);
            }

            // วันที่ปัจจุบัน
            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                
                const cell = document.createElement('div');
                cell.className = `day-cell ${isToday ? 'today-cell' : ''}`;
                cell.onclick = () => {
                    document.getElementById('inputDate').value = dateStr;
                    document.getElementById('inputTitle').focus();
                };

                let html = `<div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-bold ${isToday ? 'text-indigo-600' : 'text-slate-500'}">${day}</span>`;
                
                const hName = holidays[dateStr.substring(5)];
                if (hName) html += `<span class="holiday-text">${hName}</span>`;
                html += `</div>`;

                html += `<div class="scroll-list space-y-1">`;
                const evts = (window.appointments || []).filter(a => a.date === dateStr);
                evts.forEach(ev => {
                    html += `
                        <div class="appt-chip group">
                            <span class="truncate">${ev.title}</span>
                            <button onclick="event.stopPropagation(); window.deleteFromCloud('${ev.id}')" class="opacity-0 group-hover:opacity-100 transition-opacity ml-1 text-rose-500">
                                <i class="fas fa-times-circle"></i>
                            </button>
                        </div>`;
                });
                html += `</div>`;

                cell.innerHTML = html;
                grid.appendChild(cell);
            }

            // วันที่เดือนถัดไป
            const total = firstDay + lastDay;
            const extra = (7 - (total % 7)) % 7;
            for (let i = 0; i < extra; i++) {
                const empty = document.createElement('div');
                empty.className = 'day-cell bg-slate-50/50';
                grid.appendChild(empty);
            }
        };

        window.handleAdd = async () => {
            const date = document.getElementById('inputDate').value;
            const title = document.getElementById('inputTitle').value.trim();
            if (!date || !title) return;
            
            const btn = document.getElementById('addBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังบันทึก...';

            try {
                await window.saveToCloud({ date, title });
                document.getElementById('inputTitle').value = '';
            } catch (e) {
                alert("บันทึกไม่สำเร็จ: " + (e.message || "ปัญหาการเชื่อมต่อ"));
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        window.changeMonth = (dir) => { viewDate.setMonth(viewDate.getMonth() + dir); window.renderCalendar(); };
        window.resetToday = () => { viewDate = new Date(); window.renderCalendar(); };
        
        window.onload = () => {
            document.getElementById('inputDate').value = new Date().toLocaleDateString('en-CA');
            window.renderCalendar();
        };
    </script>
</body>
</html>
