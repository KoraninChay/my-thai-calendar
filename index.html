<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Device Thai Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ระบบจะใช้ Config ที่ฝังมากับสภาพแวดล้อมโดยอัตโนมัติ
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shared-calendar-v1';

        window.appointments = [];
        window.isOnline = false;

        // ฟังก์ชันเริ่มการเชื่อมต่อออนไลน์
        const startSync = async () => {
            try {
                const userCredential = await signInAnonymously(auth);
                const user = userCredential.user;
                window.isOnline = true;
                
                // ดึงข้อมูลแบบ Real-time จาก Cloud
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
                onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                    window.appointments = data;
                    window.renderCalendar();
                }, (err) => {
                    console.error("Cloud connection failed, using local mode.");
                    window.isOnline = false;
                });
            } catch (e) {
                console.warn("Offline: Data will not sync between devices.");
                window.isOnline = false;
            }
        };

        startSync();

        window.saveToCloud = async (appt) => {
            if (window.isOnline) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), appt);
            } else {
                alert("ขณะนี้คุณอยู่ในโหมดออฟไลน์ ข้อมูลจะไม่ซิงค์ไปยังเครื่องอื่น");
            }
        };

        window.deleteFromCloud = async (id) => {
            if (window.isOnline) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id));
            }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border: 1px solid #ddd; }
        .day-cell { min-height: 100px; background: white; padding: 6px; transition: 0.2s; position: relative; }
        .today { background: #fffbeb !important; border: 2px solid #f59e0b !important; }
        .holiday { color: #e11d48; font-size: 0.7rem; font-weight: bold; margin-top: 2px; }
        .appt-item { background: #dcfce7; color: #166534; font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; margin-top: 2px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-6 bg-indigo-600 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 id="monthDisplay" class="text-2xl font-bold">ปฏิทินของฉัน</h1>
                <p id="syncStatus" class="text-xs opacity-80 mt-1">กำลังเชื่อมต่อกับระบบคลาวด์...</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-white/20 rounded-full"><i class="fas fa-chevron-left"></i></button>
                <button onclick="resetToToday()" class="px-4 py-1 bg-white text-indigo-600 rounded-lg font-bold text-sm">วันนี้</button>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-white/20 rounded-full"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="p-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- ส่วนเพิ่มข้อมูล -->
            <div class="lg:col-span-1 space-y-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-3 text-sm"><i class="fas fa-plus-circle mr-2"></i>ลงนัดหมายใหม่</h3>
                    <input type="date" id="inputDate" class="w-full mb-2 p-2 rounded-lg border border-slate-300 text-sm">
                    <input type="text" id="inputTitle" placeholder="รายละเอียด..." class="w-full mb-3 p-2 rounded-lg border border-slate-300 text-sm">
                    <button onclick="handleAddAppt()" class="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition">
                        บันทึกข้อมูล
                    </button>
                </div>
                <div class="p-4 bg-indigo-50 rounded-2xl text-indigo-800 border border-indigo-100">
                    <p class="text-[10px] font-bold uppercase mb-1 opacity-60">คำแนะนำ</p>
                    <p class="text-xs">ข้อมูลที่บันทึกจะซิงค์ไปยังมือถือและคอมพิวเตอร์เครื่องอื่นที่เปิดลิงก์เดียวกันนี้</p>
                </div>
            </div>

            <!-- ส่วนตารางปฏิทิน -->
            <div class="lg:col-span-3">
                <div class="grid grid-cols-7 text-center py-2 text-[10px] font-bold text-slate-400 uppercase">
                    <div class="text-red-500">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-blue-500">ส</div>
                </div>
                <div id="calendar" class="calendar-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let currentViewDate = new Date();
        const holidays = { "01-01": "ปีใหม่", "04-13": "สงกรานต์", "05-01": "วันแรงงาน", "12-05": "วันพ่อ", "12-31": "สิ้นปี" };

        window.renderCalendar = () => {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('monthDisplay').innerText = `${monthNames[month]} ${year + 543}`;
            
            const statusEl = document.getElementById('syncStatus');
            if(window.isOnline) {
                statusEl.innerHTML = '<i class="fas fa-check-circle mr-1 text-green-300"></i> เชื่อมต่อ Cloud สำเร็จ (ข้อมูลซิงค์กันทุกเครื่อง)';
            }

            const grid = document.getElementById('calendar');
            grid.innerHTML = '';

            // ช่องว่างก่อนวันแรก
            for(let i=0; i<firstDay; i++) {
                grid.innerHTML += '<div class="day-cell bg-slate-50"></div>';
            }

            const today = new Date().toISOString().split('T')[0];

            // วนลูปสร้างวันที่
            for(let d=1; d<=lastDate; d++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateKey === today;
                
                const cell = document.createElement('div');
                cell.className = `day-cell ${isToday ? 'today' : ''}`;
                cell.onclick = () => document.getElementById('inputDate').value = dateKey;

                let content = `<span class="text-sm font-bold ${isToday ? 'text-amber-600' : 'text-slate-500'}">${d}</span>`;
                
                // วันหยุด
                if(holidays[dateKey.substring(5)]) {
                    content += `<div class="holiday">${holidays[dateKey.substring(5)]}</div>`;
                }

                // นัดหมายจาก Cloud
                const dayAppts = window.appointments.filter(a => a.date === dateKey);
                dayAppts.forEach(a => {
                    content += `<div class="appt-item">
                        <span class="truncate">${a.title}</span>
                        <button onclick="event.stopPropagation(); window.deleteFromCloud('${a.id}')" class="hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>`;
                });

                cell.innerHTML = content;
                grid.appendChild(cell);
            }
        };

        window.handleAddAppt = async () => {
            const date = document.getElementById('inputDate').value;
            const title = document.getElementById('inputTitle').value.trim();
            if(!date || !title) return alert("กรุณากรอกข้อมูลให้ครบ");
            
            await window.saveToCloud({ date, title });
            document.getElementById('inputTitle').value = '';
        };

        window.changeMonth = (val) => {
            currentViewDate.setMonth(currentViewDate.getMonth() + val);
            window.renderCalendar();
        };

        window.resetToToday = () => {
            currentViewDate = new Date();
            window.renderCalendar();
        };

        window.onload = () => {
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            window.renderCalendar();
        };
    </script>
</body>
</html>
