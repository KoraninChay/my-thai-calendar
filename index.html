<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินส่วนตัว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e2e8f0; border: 1px solid #e2e8f0; }
        .day-cell { min-height: 110px; background: white; padding: 8px; transition: 0.2s; cursor: pointer; position: relative; }
        .day-cell:hover { background: #f1f5f9; }
        .today { background: #f0f9ff !important; border: 2px solid #0ea5e9 !important; }
        .holiday { color: #ef4444; font-size: 0.7rem; font-weight: 500; margin-top: 2px; }
        .appt-box { background: #dcfce7; color: #166534; font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; margin-top: 2px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #22c55e; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="bg-white p-6 rounded-3xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center border border-slate-100">
            <div>
                <h1 id="monthTitle" class="text-3xl font-bold text-slate-800">ปฏิทิน</h1>
                <div id="syncStatus" class="text-xs text-slate-400 mt-1">
                    <span class="flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> พร้อมใช้งาน (บันทึกข้อมูลในเครื่องนี้)</span>
                </div>
            </div>
            <div class="flex gap-2 mt-4 md:mt-0">
                <button onclick="moveMonth(-1)" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition"><i class="fas fa-chevron-left text-slate-600"></i></button>
                <button onclick="goToday()" class="px-6 py-2 bg-sky-600 text-white rounded-2xl hover:bg-sky-700 font-medium transition shadow-md">วันนี้</button>
                <button onclick="moveMonth(1)" class="w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition"><i class="fas fa-chevron-right text-slate-600"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <aside class="space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="font-bold text-slate-700 mb-4 text-sm uppercase tracking-wider"><i class="fas fa-plus-circle mr-2 text-sky-500"></i>เพิ่มนัดหมาย</h2>
                    <div class="space-y-3">
                        <input type="date" id="inputDate" class="w-full p-3 bg-slate-50 border-none rounded-xl text-sm outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-sky-500">
                        <input type="text" id="inputTitle" placeholder="รายละเอียดนัดหมาย..." class="w-full p-3 bg-slate-50 border-none rounded-xl text-sm outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-sky-500">
                        <button onclick="onSaveClick()" class="w-full py-3 bg-sky-600 text-white rounded-xl font-bold hover:bg-sky-700 transition">บันทึกนัดหมาย</button>
                    </div>
                </div>
                <div class="bg-amber-50 p-6 rounded-3xl border border-amber-100">
                    <p class="text-amber-800 text-xs leading-relaxed">
                        <b>หมายเหตุ:</b> เนื่องจากเป็นการใช้งานบน GitHub โดยตรง ระบบจะบันทึกข้อมูลไว้ในเบราว์เซอร์ของคุณ หากต้องการให้เห็นหลายเครื่องพร้อมกันจำเป็นต้องมีการตั้งค่าฐานข้อมูลเพิ่มเติมครับ
                    </p>
                </div>
            </aside>

            <main class="lg:col-span-3 bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-100">
                <div class="grid grid-cols-7 text-center py-4 bg-slate-50 border-b text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <div class="text-red-500">อาทิตย์</div><div>จันทร์</div><div>อังคาร</div><div>พุธ</div><div>พฤหัส</div><div>ศุกร์</div><div class="text-blue-500">เสาร์</div>
                </div>
                <div id="calendar" class="calendar-grid"></div>
            </main>
        </div>
    </div>

    <script>
        let viewDate = new Date();
        let appointments = JSON.parse(localStorage.getItem('user_appointments')) || [];
        
        const holidays = { 
            "01-01": "วันปีใหม่", 
            "04-13": "วันสงกรานต์", 
            "04-14": "วันสงกรานต์", 
            "04-15": "วันสงกรานต์", 
            "05-01": "วันแรงงาน", 
            "07-28": "วันเฉลิมฯ ร.10", 
            "08-12": "วันแม่", 
            "12-05": "วันพ่อ", 
            "12-31": "วันสิ้นปี" 
        };

        function renderCalendar() {
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m + 1, 0).getDate();
            
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('monthTitle').innerText = `${monthNames[m]} ${y + 543}`;
            
            const grid = document.getElementById('calendar');
            grid.innerHTML = '';

            for(let i=0; i<first; i++) grid.innerHTML += `<div class="day-cell bg-slate-50/50"></div>`;

            const todayStr = new Date().toISOString().split('T')[0];

            for(let d=1; d<=last; d++) {
                const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = dateKey === todayStr;
                
                const cell = document.createElement('div');
                cell.className = `day-cell ${isToday ? 'today' : ''}`;
                cell.onclick = () => document.getElementById('inputDate').value = dateKey;

                let html = `<div class="text-sm font-bold ${isToday ? 'text-sky-600' : 'text-slate-600'}">${d}</div>`;
                if(holidays[dateKey.substring(5)]) html += `<div class="holiday">${holidays[dateKey.substring(5)]}</div>`;
                
                const dayAppts = appointments.filter(a => a.date === dateKey);
                dayAppts.forEach(a => {
                    html += `<div class="appt-box">
                        <span class="truncate">${a.title}</span>
                        <button onclick="event.stopPropagation(); deleteData('${a.id}')"><i class="fas fa-times opacity-50 hover:opacity-100"></i></button>
                    </div>`;
                });

                cell.innerHTML = html;
                grid.appendChild(cell);
            }
        }

        window.onSaveClick = () => {
            const date = document.getElementById('inputDate').value;
            const title = document.getElementById('inputTitle').value.trim();
            if(!date || !title) return alert("กรุณากรอกข้อมูลให้ครบ");
            
            const newAppt = { id: Date.now().toString(), date, title };
            appointments.push(newAppt);
            localStorage.setItem('user_appointments', JSON.stringify(appointments));
            
            document.getElementById('inputTitle').value = '';
            renderCalendar();
        };

        window.deleteData = (id) => {
            appointments = appointments.filter(a => a.id !== id);
            localStorage.setItem('user_appointments', JSON.stringify(appointments));
            renderCalendar();
        };

        window.moveMonth = (v) => { viewDate.setMonth(viewDate.getMonth() + v); renderCalendar(); };
        window.goToday = () => { viewDate = new Date(); renderCalendar(); };

        window.onload = () => {
            document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
            renderCalendar();
        };
    </script>
</body>
</html>
